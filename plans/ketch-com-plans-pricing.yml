description: |
  Reconciled plans and pricing for Ketch privacy management software. Metering is driven by monthly
  unique users seeing the Ketch privacy experience plus integration count. Source: ketch.com/pricing.
sources:
  - https://www.ketch.com/pricing
  - https://www.ketch.com/ketch-free-cookie-banner
plans:
  - id: ketch-free
    name: Free
    type: free
    description: Free CMP tier for small businesses with basic privacy banner needs. Up to 5k unique users per month and 2 integrations.
    entries:
      - label: Unique users
        name: unique_users
        type: included
        metric: users
        limit: 5000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Integrations
        name: integrations
        type: included
        metric: integrations
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Email support
        name: support_email
        type: included
        metric: support
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
